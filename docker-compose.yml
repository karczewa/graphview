services:
  app:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # In Docker, Neo4j runs on the host machine.
      # If NEO4J_URI in your .env uses localhost, override it here:
      # NEO4J_URI: bolt://host.docker.internal:7687
      FRONTEND_ORIGIN: http://localhost:3001
    restart: unless-stopped
