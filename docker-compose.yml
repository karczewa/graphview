services:
  neo4j:
    image: neo4j:5
    profiles: [with-db]
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      FRONTEND_ORIGIN: http://localhost:3001
      NEO4J_URI: bolt://neo4j:7687
    restart: unless-stopped

volumes:
  neo4j_data:
